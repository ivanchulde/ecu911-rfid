<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ivan Chulde"/>
    <meta name="description" content="ECU 911 Ambato Vehicle Application Access Control" />
    <title>Access History</title>
    <link rel="stylesheet" href="src/style.css">
    
</head>
<body>
  <header>
      <img src="src/images/ecu911_logo.webp" alt="ECU911 Logo">
      <span>ECU 911 - Access History</span>
      <button class="logout-btn">Log out</button>
      <ul class="navigation">
          <li><a href="./index.html" id="home">Home</a></li>
          <li class="current"><a href="./history.html" id="history">View History</a></li>
      </ul>
  </header>

  <main>
    <div id="main">
        <!-- History Page Counters -->
        <div class="history-stadistics">
            <h2>Access Summary</h2>
            <p>Entries: <span id="entryCount">0</span></p>
            <p>Exits: <span id="exitCount">0</span></p>
            <p>Denied: <span id="deniedCount">0</span></p>
        </div>
        <!-- Filters -->
        <div class="history-filters">
            <form id="filterForm">
                <input type="text" id="filterInput" placeholder="Filter by user, country, or date...">
                <button type="submit">Filter</button>
            </form>
        </div>

        <!-- Statistics -->
        <div class="history-summary">
            <ul id="logList"></ul>
        </div>
    </div>

    

  </main>
  <footer class="modern-footer">
      <div class="footer-bottom">
          <p>&copy; <span id="current-year"></span> Ivan Chulde | Ambato-Ecuador.</p>
          <p>Last Modified in: <span id="lastModified"></span></p>
      </div>
  </footer>
  <script type="module" src="src/history.js"></script>
</body>
</html>
